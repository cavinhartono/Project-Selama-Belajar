<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #1c1c1c;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      /* background: linear-gradient(#e91e63, #ffc107); */
      clip-path: circle(22% at 30% 20%);
    }

    body::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      /* background: linear-gradient(white, #da00ff); */
      clip-path: circle(20% at 70% 90%);
    }

    .container {
      position: relative;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      overflow: hidden;
      z-index: 10;
      backdrop-filter: blur(18px);
      border-top: 1px solid rgba(255,255,255,0.2);
      border-left: 1px solid rgba(255,255,255,0.2);
      box-shadow: 5px 5px 30px rgba(0, 0, 0, 0.2);
    }

    .container .kalkulator {
      position: relative;
      display: grid;
    }

    .container .kalkulator .value {
      grid-column: span 4;
      width: 300px;
      height: 140px;
      text-align: right;
      border: none;
      outline: none;
      padding: 10px;
      font-size: 30px;
      background: transparent;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      border-right: 1px solid rgba(255,255,255,0.05);
      color: white;
    }

    .container .kalkulator span {
      display: grid;
      width: 75px;
      height: 75px;
      place-items: center;
      font-size: 20px;
      font-weight: 400;
      color: white;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      border-right: 1px solid rgba(255,255,255,0.2);
      transition: 0.5s;
      /* display: flex;
      justify-content: center;
      align-items: center; */
    }

    .container .kalkulator span:hover {
      transition: 0s;
      background: rgba(255, 255, 255, 0.05);
    }

    .container .kalkulator span:active {
      background-color: lightgreen;
      color: #1c1c1c;
      font-size: 24px;
      font-weight: 500;
    }

    .container .kalkulator .clear {
      grid-column: span 2;
      width: 150px;
      background: rgba(255, 255, 255, 0.05);
    }

    .container .kalkulator .samaDengan {
      grid-column: span 2;
      width: 150px;
      background: rgba(255, 255, 255, 0.05);

    }
  </style>
</head>
<body>
  <div class="container">
    <form class="kalkulator" name="calc">
      <input type="text" readonly class="value" name="txt">
      <span class="num clear" onclick="calc.txt.value = ''">C</span>
      <span class="num" onclick="document.calc.txt.value += '/'">:</span>
      <span class="num" onclick="document.calc.txt.value += '*'">X</span>
      <span class="num" onclick="document.calc.txt.value += '7'">7</span>
      <span class="num" onclick="document.calc.txt.value += '8'">8</span>
      <span class="num" onclick="document.calc.txt.value += '9'">9</span>
      <span class="num" onclick="document.calc.txt.value += '-'">-</span>
      <span class="num" onclick="document.calc.txt.value += '4'">4</span>
      <span class="num" onclick="document.calc.txt.value += '5'">5</span>
      <span class="num" onclick="document.calc.txt.value += '6'">6</span>
      <span class="num" onclick="document.calc.txt.value += '+'">+</span>
      <span class="num" onclick="document.calc.txt.value += '1'">1</span>
      <span class="num" onclick="document.calc.txt.value += '2'">2</span>      
      <span class="num" onclick="document.calc.txt.value += '3'">3</span>
      <span class="num" onclick="document.calc.txt.value += '0'">0</span>
      <span class="num" onclick="document.calc.txt.value += '00'">00</span>
      <span class="num" onclick="document.calc.txt.value += '.'">.</span>
      <span class="num samaDengan" onclick="document.calc.txt.value = eval(calc.txt.value)">=</span>
    </form>
  </div>
</body>
</html>
